    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Layout Principal --- */
        .app-container {
            display: flex;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        /* --- Barra Lateral (Datos Paciente) --- */
        .sidebar {
            width: 300px;
            background: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #555;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        button.btn-clear {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }

        button.btn-clear:hover { opacity: 0.9; }

        /* --- Área Principal --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #e0e0e0;
            position: relative;
        }

        /* --- Barra de Herramientas Superior --- */
        .toolbar {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .toolbar select {
            padding: 5px;
            border-radius: 4px;
            font-size: 1rem;
        }

        .tool-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .tool-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-btn.active { background: var(--accent-color); border-color: var(--accent-color); }
        
        .print-btn { background-color: #27ae60; font-weight: bold; margin-left: auto;}

        /* --- Lienzo del Documento --- */
        .document-area {
            flex: 1;
            overflow: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 24px;
            padding: 20px;
            cursor: crosshair; /* Default cursor */
        }

        #document-wrapper,
        .document-page {
            position: relative;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            /* Tamaño inicial referencial, se ajustará con JS */
            width: 800px; 
            height: 1000px;
        }

        #document-img,
        .document-page-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* Click through to wrapper */
            user-select: none;
        }

        /* --- Elementos Agregados (Texto y X) --- */
        .added-element, .cursor-preview {
            position: absolute;
            font-family: 'Courier New', Courier, monospace; /* Estilo máquina de escribir */
            font-weight: bold;
            color: #000;
            cursor: grab;
            user-select: none;
            white-space: nowrap;
            font-size: 16px; /* Ajustable */
            z-index: 5;
			line-height: 1;      /* Elimina el espacio extra arriba/abajo del texto */
            padding: 0;          /* Quita cualquier margen interno */
            pointer-events: auto; /* Para que se puedan borrar/mover */
            height: 15px;        /* Altura fija igual al tamaño de fuente */
            width: 15px;         /* Ancho fijo para que sea un cuadrado perfecto */
            text-align: center;  /* Centra la X en su pequeño cuadradito */
        }
.cursor-preview {
    pointer-events: none !important; 
}
        .added-element:hover {
            outline: 1px dashed #3498db;
        }

        .is-dragging {
            cursor: grabbing !important;
            opacity: 0.7;
        }

        /* Datos autollenados (son fijos en coordenadas pero editables en sidebar) */
        .auto-field {
            position: absolute;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            color: #000;
            pointer-events: none; /* No se mueven con mouse, solo por config */
            background: rgba(255, 255, 0, 0.1); /* Ligero resalte en pantalla para verlos */
        }

        /* --- Footer y Debug --- */
        footer {
            background: #222;
            color: #888;
            text-align: center;
            padding: 5px;
            font-size: 0.8rem;
        }

        .debug-panel {
            position: fixed;
            bottom: 40px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            display: none; /* Oculto por defecto */
            z-index: 100;
            border: 1px solid #0f0;
        }

/* --- Estilos para la Caja de Texto Editable --- */
.tipo-texto {
    min-width: 100px;
    min-height: 30px;
    width: 250px;           /* Dale un ancho inicial para que no empiece como un punto */
    height: auto;
    resize: both;
    overflow: visible;       /* Para el resize manual, 'hidden' funciona mejor que 'visible' */
    
    /* --- ALINEACIÓN --- */
    text-align: left;       /* Justifica a la izquierda */
    word-wrap: break-word;  /* Rompe palabras largas si es necesario */
    
    background: rgba(255, 255, 255, 0.6);
    border: 1px dashed #3498db;
    padding: 5px;
    user-select: text !important;
    cursor: text;
    line-height: 1.2;
    display: block;         /* Cambiado de inline-block a block para controlar el ancho */
}

/* Forzar que el manejador de tamaño sea visible */
.tipo-texto::-webkit-resizer {
    background-color: #3498db;
    border: 2px solid white;
    border-radius: 2px;
}

.tipo-texto:focus {
    outline: 2px solid var(--accent-color);
    background: white;
    border-style: solid;
}

@media print {
    .tipo-texto { border: none !important; background: transparent !important; }
    .resizer { display: none !important; }
}
		
        /* --- ESTILOS DE IMPRESIÓN --- */
@media print {
            /* 1. Configuración de la página física */
            @page {
                size: auto;   /* Deja que el navegador detecte el tamaño */
                margin: 0mm;  /* ¡IMPORTANTE! Elimina márgenes de fecha/hora/url */
            }

            /* 2. Ocultar todo lo que no es el documento */
            body { 
                background: white; 
                margin: 0; 
                padding: 0;
                /* Opcional: Si se corta a la derecha, reduce esta escala a 0.95 */
                transform: scale(1.0); 
                transform-origin: top left;
            }

            .sidebar, .toolbar, footer, .debug-panel, ::-webkit-scrollbar {
                display: none !important;
            }

            .app-container { 
                display: block; 
                height: auto; 
                overflow: visible;
            }

            .main-content { 
                display: block; 
                margin: 0; 
                padding: 0; 
                background: white;
            }

            .document-area { 
                display: block; 
                padding: 0; 
                margin: 0; 
                overflow: visible; 
            }

            /* 3. EL TRUCO: Forzar el mismo tamaño que en pantalla */
            #document-wrapper {
                position: absolute;
                top: 0;
                left: 0;
                /* MANTENER EL MISMO ANCHO QUE EN PANTALLA (800px) 
                   Esto evita que el texto se mueva respecto a la imagen */
                width: 800px !important; 
                height: 1000px !important; 
                
                margin: 0 !important;
                box-shadow: none;
                border: none;
                
                /* Asegura que los colores e imágenes de fondo se impriman */
                print-color-adjust: exact; 
                -webkit-print-color-adjust: exact;
                
                /* Evita que se genere una segunda página si algo sobra por 1px */
                overflow: hidden; 
            }

            /* Quitar bordes de selección al imprimir */
            .added-element { border: none !important; outline: none !important; }
            .added-element:hover { outline: none !important; }
            .auto-field { background: transparent !important; }
        }

		/* Ocultar bordes de las cajas de texto al imprimir */
            .tipo-texto {
                border: none !important;
                background: transparent !important;
                resize: none !important;
                outline: none !important;
            }
/* Estilo para la X fantasma (preview) */
.cursor-preview {
    position: absolute;
    font-family: 'Courier New', Courier, monospace; /* Misma fuente que la X real */
    font-size: 15px; /* Mismo tamaño */
    color: rgba(0, 0, 255, 0.5); /* Azul semitransparente para diferenciarlo */
    font-weight: bold;
    pointer-events: none; /* No interfiere con el clic */
    z-index: 1000;
    display: none; /* Oculto por defecto */
}

        function getCurrentEditablePages() {
            return Array.from(document.querySelectorAll('.document-page'));
        }

        function serializeCurrentElements() {
            return Array.from(document.querySelectorAll('.added-element')).map(el => {
                const page = el.closest('.document-page') || document.getElementById('document-wrapper');
                return {
                    pageKey: page.dataset.pageKey || lastDoc,
                    html: el.innerHTML,
                    classList: Array.from(el.classList),
                    top: el.style.top,
                    left: el.style.left,
                    width: el.style.width,
                    height: el.style.height,
                    contentEditable: el.contentEditable
                };
            });
        }

        function bindEditableElementEvents(el) {
            el.addEventListener('mousedown', startDrag);
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                if (currentTool === 'erase') el.remove();
            });
        }

        function renderRmBiosecurityPreviewPages() {
            const area = document.getElementById('area-trabajo');
            document.querySelectorAll('.biosecurity-page').forEach(page => page.remove());

            rmBiosecurityPages.forEach((pageConfig, index) => {
                const page = document.createElement('div');
                page.className = 'document-page biosecurity-page';
                page.dataset.pageKey = getPageKeyForDoc('orden_rm.jpg', index + 1);
                page.style.width = pageConfig.width + 'px';
                page.style.height = pageConfig.height + 'px';

                const img = document.createElement('img');
                img.className = 'document-page-img';
                img.src = pageConfig.image;
                img.alt = 'Encuesta de bioseguridad';
                page.appendChild(img);

                Object.entries(pageConfig.fields).forEach(([field, coords]) => {
                    if (!coords) return;
                    const autoField = document.createElement('div');
                    autoField.className = 'auto-field bio-auto-field';
                    autoField.dataset.autoField = field;
                    autoField.style.top = coords.top + 'px';
                    autoField.style.left = coords.left + 'px';
                    page.appendChild(autoField);
                });

                area.appendChild(page);
            });
        }

        function removeRmBiosecurityPreviewPages() {
            document.querySelectorAll('.biosecurity-page').forEach(page => page.remove());
        }

        function restoreSavedElements(fileName) {
            const pagesByKey = {};
            getCurrentEditablePages().forEach(page => {
                pagesByKey[page.dataset.pageKey] = page;
            });

            (savedElements[fileName] || []).forEach(data => {
                const targetPage = pagesByKey[data.pageKey || fileName] || document.getElementById('document-wrapper');
                const el = document.createElement('div');
                data.classList.forEach(cls => el.classList.add(cls));
                el.style.top = data.top;
                el.style.left = data.left;
                el.style.width = data.width;
                el.style.height = data.height;
                el.innerHTML = data.html;
                el.contentEditable = data.contentEditable;
                bindEditableElementEvents(el);
                targetPage.appendChild(el);
            });
        }
		

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getPrintablePatientData() {
            const fechaRaw = document.getElementById('in-fecha').value;
            let fecha = '';

            if (fechaRaw) {
                const partes = fechaRaw.split('-');
                fecha = `${partes[2]}-${partes[1]}-${partes[0]}`;
            }

            return {
                nombre: document.getElementById('in-nombre').value,
                apellidos: document.getElementById('in-apellidos').value,
                edad: document.getElementById('in-edad').value,
                rutpaciente: document.getElementById('in-rutpaciente').value,
                fecha,
                diagnostico: document.getElementById('in-diagnostico').value,
                sala: document.getElementById('in-sala').value,
                medico: document.getElementById('in-medico').value,
                rutmedico: document.getElementById('in-rutmedico').value
            };
        }

        function buildBiosecurityPage(pageConfig, patientData) {
            const fieldsHtml = Object.entries(pageConfig.fields)
                .filter(([, coords]) => coords)
                .map(([field, coords]) => `
                    <div class="auto-field print-extra-field" style="top:${coords.top}px; left:${coords.left}px;">
                        ${escapeHtml(patientData[field])}
                    </div>
                `)
                .join('');

            return `
                <section class="print-page" style="width:${pageConfig.width}px; height:${pageConfig.height}px;">
                    <img class="print-page-img" src="${pageConfig.image}" alt="Encuesta de bioseguridad">
                    ${fieldsHtml}
                </section>
            `;
        }

        function printCurrentDocument() {
            const selectedDoc = document.getElementById('doc-selector').value;

            if (selectedDoc !== 'orden_rm.jpg') {
                window.print();
                return;
            }

            updateAutoFields();

            const printWindow = window.open('', '_blank', 'width=900,height=1100');
            if (!printWindow) {
                alert('El navegador bloqueo la ventana de impresion.');
                return;
            }

            const printablePagesHtml = getCurrentEditablePages().map(page => {
                const pageClone = page.cloneNode(true);
                const preview = pageClone.querySelector('#x-preview');
                if (preview) preview.remove();

                return `
                    <section class="print-page" style="width:${page.offsetWidth}px; height:${page.offsetHeight}px;">
                        ${pageClone.innerHTML}
                    </section>
                `;
            }).join('');

            printWindow.document.write(`
                <html lang="es">
                <head>
                    <title>Orden RM con encuesta de bioseguridad</title>
                    <style>
                        @page { margin: 0; size: auto; }
                        * { box-sizing: border-box; }
                        body {
                            margin: 0;
                            padding: 0;
                            background: white;
                            print-color-adjust: exact;
                            -webkit-print-color-adjust: exact;
                        }
                        .print-page,
                        #document-wrapper {
                            position: relative;
                            width: 800px;
                            height: 1000px;
                            margin: 0;
                            overflow: hidden;
                            background: white;
                            page-break-after: always;
                            break-after: page;
                        }
                        .print-page:last-child {
                            page-break-after: auto;
                            break-after: auto;
                        }
                        #document-img,
                        .print-page-img,
                        .document-page-img {
                            width: 100%;
                            height: 100%;
                            object-fit: contain;
                            pointer-events: none;
                            user-select: none;
                        }
                        .added-element,
                        .auto-field {
                            position: absolute;
                            font-family: 'Courier New', Courier, monospace;
                            font-weight: bold;
                            color: #000;
                            white-space: nowrap;
                            font-size: 16px;
                            line-height: 1;
                            padding: 0;
                            background: transparent !important;
                            border: none !important;
                            outline: none !important;
                        }
                        .tipo-cruz {
                            color: blue;
                            width: 16px;
                            height: 16px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                        }
                        .tipo-texto {
                            resize: none !important;
                            overflow: hidden;
                            white-space: pre-wrap;
                        }
                        .print-extra-field {
                            min-width: 15px;
                            min-height: 15px;
                        }
                    </style>

                <body>
                    ${printablePagesHtml}
                </body>
                </html>

            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => printWindow.print(), 500);
        }

        // Inicialización
// Inicialización
// Inicialización
        window.onload = function() {
            document.getElementById('in-fecha').valueAsDate = new Date();

            changeDoc();
            updateAutoFields();
        };

        // --- 3. FUNCIONES DE INTERFAZ ---
        
        document.getElementById('doc-selector').addEventListener('change', changeDoc);

function changeDoc() {
    const selector = document.getElementById('doc-selector');
    const newDoc = selector.value;

    // A. GUARDAR elementos del documento actual antes de salir
    savedElements[lastDoc] = serializeCurrentElements();

    // B. LIMPIAR el wrapper de los elementos visuales (pero no los auto-fields)
    const currentElements = document.querySelectorAll('.added-element');
    currentElements.forEach(el => el.remove());
    removeRmBiosecurityPreviewPages();

    // C. CAMBIAR IMAGEN Y POSICIONES
    document.getElementById('document-img').src = newDoc;
    document.getElementById('document-wrapper').dataset.pageKey = getPageKeyForDoc(newDoc);
    if (newDoc === 'orden_rm.jpg') renderRmBiosecurityPreviewPages();
    updateAutoFieldsPositions(newDoc);

    // D. RESTAURAR elementos del nuevo documento (si existen)
    restoreSavedElements(newDoc);
    updateAutoFields();
    setTool(currentTool);

    // Actualizar referencia
    lastDoc = newDoc;
}

        function setTool(tool) {
            currentTool = tool;
            const preview = document.getElementById('x-preview');
			if (preview) preview.style.display = 'none';
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            if(tool !== 'debug') { 
                let btnId = tool === 'text' ? 'btn-text' : 
                            tool === 'x' ? 'btn-x' : 
                            tool === 'move' ? 'btn-move' : 'btn-erase';
                document.getElementById(btnId).classList.add('active');
            }

            getCurrentEditablePages().forEach(page => {
                if (tool === 'text') page.style.cursor = 'text';
                else if (tool === 'x') page.style.cursor = 'crosshair';
                else if (tool === 'move') page.style.cursor = 'default';
                else if (tool === 'erase') page.style.cursor = 'not-allowed';
            });
        }

        function toggleDebug() {
            isDebug = !isDebug;
            const panel = document.getElementById('debug-box');
            panel.style.display = isDebug ? 'block' : 'none';
            const btn = document.getElementById('btn-debug');
            btn.style.color = isDebug ? '#0f0' : 'white';
        }

        // --- 4. LÓGICA DEL CANVAS/DOCUMENTO ---

        const wrapper = document.getElementById('document-wrapper');
        const documentArea = document.getElementById('area-trabajo');

documentArea.addEventListener('click', function(e) {
            if (e.target.classList.contains('added-element')) return; 
            if (currentTool === 'move' || currentTool === 'erase') return;

            const targetPage = e.target.closest('.document-page');
            if (!targetPage) return;

            const rect = targetPage.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (currentTool === 'text') {
                // Creamos la caja vacía directamente sin preguntar
                createElement(x, y, '', 'text', targetPage);
            } else if (currentTool === 'x') {
                createElement(x - 6, y - 8, "X", 'x', targetPage); 
            }
        });

documentArea.addEventListener('mousemove', function(e) {
    const targetPage = e.target.closest('.document-page');
    if (!targetPage) return;

    const rect = targetPage.getBoundingClientRect();
    // Coordenadas relativas al documento
    const x = Math.round(e.clientX - rect.left);
    const y = Math.round(e.clientY - rect.top);

    // Lógica del Preview de la X pura
    const preview = document.getElementById('x-preview');
    if (preview) {
        if (currentTool === 'x') {
            if (preview.parentElement !== targetPage) targetPage.appendChild(preview);
            preview.style.display = 'block';
            // Usamos los mismos desfases que en createElement para precisión total
            preview.style.left = (x - 6) + 'px';
            preview.style.top = (y - 8) + 'px';
        } else {
            preview.style.display = 'none';
        }
    }

    // Lógica de Debug (solo si está activo)
    if (isDebug) {
        const dbX = document.getElementById('db-x');
        const dbY = document.getElementById('db-y');
        if (dbX && dbY) {
            dbX.innerText = x;
            dbY.innerText = y;
        }
    }
});

// Asegurar que el preview se oculte si el mouse sale del área de trabajo
documentArea.addEventListener('mouseleave', () => {
    const preview = document.getElementById('x-preview');
    if (preview) preview.style.display = 'none';
});

function createElement(x, y, content, type, targetPage = wrapper) {
    const el = document.createElement('div');
    el.classList.add('added-element');
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    
    if (type === 'x') {
        el.innerText = "X";
        el.classList.add('tipo-cruz');
        el.style.fontSize = '15px'; 
        el.style.color = 'blue';
        el.style.fontWeight = 'bold';
        el.style.width = '16px';
        el.style.height = '16px';
        el.style.display = 'flex';
        el.style.alignItems = 'center';
        el.style.justifyContent = 'center';
    } else if (type === 'text') {
        el.classList.add('tipo-texto');
        el.contentEditable = "true";
        el.innerText = content;
        
        // --- LÓGICA PARA EL "COSITO" DE REDIMENSIONAR ---
        el.addEventListener('mousedown', (e) => {
            const rect = el.getBoundingClientRect();
            // Detectamos si el clic fue en la esquina inferior derecha (el resizer)
            const isResizer = (e.clientX > rect.right - 20 && e.clientY > rect.bottom - 20);
            
            if (isResizer) {
                // Si toca el cosito, dejamos que el navegador haga su magia
                e.stopPropagation();
            } else if (currentTool === 'text') {
                // Si hace clic para escribir, no movemos la caja
                e.stopPropagation();
            }
        });

        setTimeout(() => el.focus(), 10);
    }

    bindEditableElementEvents(el);

    targetPage.appendChild(el);
}

        // --- 5. LÓGICA DE MOVER (DRAG AND DROP) ---

        function startDrag(e) {
            if (currentTool !== 'move') return;
            isDragging = true;
            dragElement = e.target;
            
            const rect = dragElement.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            dragElement.classList.add('is-dragging');
        }

        document.addEventListener('mousemove', function(e) {
            if (!isDragging || !dragElement) return;
            e.preventDefault();

            const dragPage = dragElement.closest('.document-page') || wrapper;
            const wrapperRect = dragPage.getBoundingClientRect();
            let newX = e.clientX - wrapperRect.left - offsetX;
            let newY = e.clientY - wrapperRect.top - offsetY;

            dragElement.style.left = newX + 'px';
            dragElement.style.top = newY + 'px';
        });

        document.addEventListener('mouseup', function() {
            if (isDragging && dragElement) {
                dragElement.classList.remove('is-dragging');
                isDragging = false;
                dragElement = null;
            }
        });

        // --- 6. AUTOLLENADO Y FORMULARIO ---

        function updateAutoFields() {
            document.getElementById('auto-nombre').innerText = document.getElementById('in-nombre').value;
            document.getElementById('auto-apellidos').innerText = document.getElementById('in-apellidos').value;
            document.getElementById('auto-edad').innerText = document.getElementById('in-edad').value;
            document.getElementById('auto-rutpaciente').innerText = document.getElementById('in-rutpaciente').value;
            
// --- CÓDIGO NUEVO (Pega esto encima) ---
let fechaRaw = document.getElementById('in-fecha').value;
if (fechaRaw) {
    // La fecha viene como "2025-12-24" (Año-Mes-Día)
    let partes = fechaRaw.split('-'); 
    // partes[0] es Año, partes[1] es Mes, partes[2] es Día
    
    // Lo reordenamos a Día-Mes-Año
    document.getElementById('auto-fecha').innerText = `${partes[2]}-${partes[1]}-${partes[0]}`;
} else {
    document.getElementById('auto-fecha').innerText = "";
}

            document.getElementById('auto-diagnostico').innerText = document.getElementById('in-diagnostico').value;
            document.getElementById('auto-sala').innerText = document.getElementById('in-sala').value;
            document.getElementById('auto-medico').innerText = document.getElementById('in-medico').value;
            document.getElementById('auto-rutmedico').innerText = document.getElementById('in-rutmedico').value;

            const patientData = getPrintablePatientData();
            document.querySelectorAll('.bio-auto-field').forEach(el => {
                el.innerText = patientData[el.dataset.autoField] || '';
            });
        }

        function updateAutoFieldsPositions(fileName) {
            const config = docConfig[fileName];
            // Ahora incluimos rutpaciente y diferenciamos rutmedico
            const fields = ['nombre', 'apellidos', 'edad', 'rutpaciente',  'fecha', 'diagnostico', 'sala', 'medico', 'rutmedico'];

            if (!config) {
                fields.forEach(f => {
                    const el = document.getElementById('auto-' + f);
                    if(el) el.style.display = 'none';
                });
                return;
            }

            fields.forEach(field => {
                const el = document.getElementById('auto-' + field);
                const coords = config[field];

                if (coords && el) {
                    el.style.display = 'block';
                    el.style.top = coords.top + 'px';
                    el.style.left = coords.left + 'px';
                } else if (el) {
                    el.style.display = 'none';
                }
            });
        }

        function clearForm() {
            if(confirm("¿Estás seguro de limpiar los datos del paciente?")) {
                document.getElementById('in-nombre').value = "";
                document.getElementById('in-apellidos').value = "";
                document.getElementById('in-rutpaciente').value = ""; 
				document.getElementById('in-edad').value = ""; 
                document.getElementById('in-diagnostico').value = "";
                document.getElementById('in-sala').value = "";
                
                
// Limpiar visualmente
        const added = document.querySelectorAll('.added-element');
        added.forEach(el => el.remove());

        // Limpiar memoria del doc actual
        const currentDoc = document.getElementById('doc-selector').value;
        savedElements[currentDoc] = [];
				updateAutoFields();
            }
        }

function borrarTodasLasCruces() {
            // Buscamos solo los elementos con la clase que definimos arriba
            const cruces = document.querySelectorAll('.tipo-cruz');

            if (cruces.length === 0) {
                alert("No hay cruces para borrar.");
                return;
            }

            if (confirm("¿Estás seguro de borrar TODAS las cruces (X)?")) {
                cruces.forEach(cruz => {
                    cruz.remove();
                });
            }
        }

    </script>
